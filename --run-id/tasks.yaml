    prompt: "Malformed generated code in a situation I can't describe

      **Describe the bug**\r

      For\r

      \r

      ```svelte\r

      {#if $foo}\r

      {:else}\r

      \t{#if bar()}\r

      \t\t<Baz/>\r

      \t{/if}\r

      {/if}\r

      ```\r

      \r

      or alternatively\r

      \r

      ```svelte\r

      {#if $foo}\r

      {:else if bar()}\r

      \t<Baz/>\r

      {/if}\r

      ```\r

      \r

      Svelte generates code like `if ((show_if == null) || ) show_if =
      !!(bar())`.\r

      \r

      **To Reproduce**\r

      Compile the above, and look at the invalid code that's generated.\r

      \r

      **Expected behavior**\r

      Presumably the ` || ` part just shouldn't be there, but I haven't checked
      whether that code would do what is expected.\r

