  - id: svelte-1376
    repo_id: svelte-1376
    title: SWE-PolyBench sveltejs__svelte-1376
    type: bug_fix
    difficulty: medium
    prompt: "`this` has wrong meaning in custom event handler

      In this situation
      ([REPL](https://svelte.technology/repl?version=1.59.0&gist=08ce28e2175879\
      6e9651169507eb6af3))...\r

      \r

      ```html\r

      <p>Select the input, hit 'enter', check the console</p>\r

      <input on:enter='this.blur()'>\r

      \r

      <script>\r

      \  export default {\r

      \    events: {\r

      \      enter(node, callback) {\r

      \        function handleKeydown(event) {\r

      \          if (event.which === 13) callback();\r

      \        }\r

      \r

      \        node.addEventListener('keydown', handleKeydown);\r

      \r

      \        return {\r

      \          destroy() {\r

      \            node.removeEventListener('keydown', handleKeydown);\r

      \          }\r

      \        };\r

      \      }\r

      \    }\r

      \  };\r

      </script>\r

      ```\r

      \r

      I'd expect `this.blur()` to refer to the `<input>`, but this code is
      generated:\r

      \r

      ```js\r

      enter_handler = enter.call(component, input, function(event) {\r

      \tthis.blur();\r

      });\r

      ```\r

      \r

      `this` should probably be rewritten as `input`.\r

      \r

      Workaround is this:\r

      \r

      ```diff\r

      -if (event.which === 13) callback();\r

      +if (event.which === 13) callback.call(node);\r

      ```"
    deterministic_input:
      retrieval_input:
        query: "`this` has wrong meaning in custom event handler

          In this situation
          ([REPL](https://svelte.technology/repl?version=1.59.0&gist=08ce28e217\
          58796e9651169507eb6af3))...\r

          \r

          ```html\r

          <p>Select the input, hit 'enter', check the console</p>\r

          <input on:enter='this.blur()'>\r

          \r

          <script>\r

          \  export default {\r

          \    events: {\r

          \      enter(node, callback) {\r

          \        function handleKeydown(event) {\r

          \          if (event.which === 13) callback();\r

          \        }\r

          \r

          \        node.addEventListener('keydown', handleKeydown);\r

          \r

          \        return {\r

          \          destroy() {\r

          \            node.removeEventListener('keydown', handleKeydown);\r

          \          }\r

          \        };\r

          \      }\r

          \    }\r

          \  };\r

          </script>\r

          ```\r

          \r

          I'd expect `this.blur()` to refer to the `<input>`, but this code is
          generated:\r

          \r

          ```js\r

          enter_handler = enter.call(component, input, function(event) {\r

          \tthis.blur();\r

          });\r

          ```\r

          \r

          `this` should probably be rewritten as `input`.\r

          \r

          Workaround is this:\r

          \r

          ```diff\r

          -if (event.which === 13) callback();\r

          +if (event.which === 13) callback.call(node);\r

          ```"
      oracle_input: null
      embedding_input: >-
        `this` has wrong meaning in custom event handler

        In this situation (REPL)...


        ```html

        <p>Select the input, hit 'enter', check the console</p>

        <input on:enter='this.blur()'>


        <script>
          export default {
            events: {
              enter(node, callback) {
                function handleKeydown(event) {
                  if (event.which === 13) callback();
                }

                node.addEventListener('keydown', handleKeydown);

                return {
                  destroy() {
                    node.removeEventListener('keydown', handleKeydown);
                  }
                };
              }
            }
          };
        </script>

        ```


        I'd expect `this.blur()` to refer to the `<input>`, but this code is
        generated:


        ```js

        enter_handler = enter.call(component, input, function(event) {
        	this.blur();
        });

        ```


        `this` should probably be rewritten as `input`.


        Workaround is this:


        ```diff

        -if (event.which === 13) callback();

        +if (event.which === 13) callback.call(node);

        ```
      intent: debug
      dimensions:
