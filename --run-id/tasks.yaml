          indicating that `width` and `height` aren't inherently mandatory. I
          had the same results testing locally and with REPL.\r

          \r

          When I try `<svg width=500 height=500 viewbox=\"-250 -250 500 500\">`
          it will adjust the size correctly, but doesn't respect the viewbox.\r

          \r

          Since I started with pasting a blog example, I mistakenly thought
          svelte couldn't handle viewbox."
