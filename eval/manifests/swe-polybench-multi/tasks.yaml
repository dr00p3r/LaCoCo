    prompt: "VSCode fails to recognize URLs containing the characters 【】

      <!-- ⚠️⚠️ Do Not Delete This! bug_report_template ⚠️⚠️ -->\r

      <!-- Please read our Rules of Conduct:
      https://opensource.microsoft.com/codeofconduct/ -->\r

      <!-- 🕮 Read our guide about submitting issues:
      https://github.com/microsoft/vscode/wiki/Submitting-Bugs-and-Suggestions
      -->\r

      <!-- 🔎 Search existing issues to avoid creating duplicates. -->\r

      <!-- 🧪 Test using the latest Insiders build to see if your issue has
      already been fixed: https://code.visualstudio.com/insiders/ -->\r

      <!-- 💡 Instead of creating your report here, use 'Report Issue' from the
      'Help' menu in VS Code to pre-fill useful information. -->\r

      - VS Code Version: 1.55.2\r

      - OS Version: Windows 10 18363.1440\r

      \r

      Steps to Reproduce:\r

      \r

      1. enter a URL containing 【 or 】, for example:
      https://zh.wikipedia.org/wiki/【我推的孩子】\r

      \r

      VSCode usually can recognize URLs with non-alphanumeric characters, for
      example, the URL https://zh.wikipedia.org/wiki/新加坡 can be properly
      recognized and you can ctrl+click to open it. \r

      \r

      However, URLs containing 【 or 】, like the above example I gave, cannot be
      properly recognized in VSCode.\r

      \r

      I assume this is a bug or an oversight rather than a design decision, as I
      can't see any reason to exclude 【 or 】 in URLs. While I write this issue I
      notice that Github actually recognizes such URLs with no problem, so I
      guess it's not outrageous to ask VSCode to support them too.\r

