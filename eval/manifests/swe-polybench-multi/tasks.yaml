  - id: material-ui-13534
    repo_id: material-ui-13534
    title: SWE-PolyBench mui__material-ui-13534
    type: bug_fix
    difficulty: medium
    prompt: "[Badge] Add disabled property to quick hide/show

      <!--- Provide a general summary of the issue in the Title above -->\r

      \r

      <!--\r

      \    Thank you very much for contributing to Material-UI by creating an
      issue! ❤️\r

      \    To avoid duplicate issues we ask you to check off the following
      list.\r

      -->\r

      \r

      <!-- Checked checkbox should look like this: [x] -->\r

      - [X] I have searched the
      [issues](https://github.com/mui-org/material-ui/issues) of this repository
      and believe that this is not a duplicate.\r

      \r

      ## Expected Behavior\r

      <!---\r

      \    If you're describing a bug, tell us what should happen.\r

      \    If you're suggesting a change/improvement, tell us how it should
      work.\r

      -->\r

      \r

      Im looking for a quick way to hide/show a badge on a user avatar\r

      \r

      ```jsx\r

      <Badge badgeContent={<MdMessage />} color=\"error\">\r

      \t<Avatar>\r

      \t\t<FaUser/>\r

      \t</Avatar>\r

      </Badge>\r

      ```\r

      \r

      \r

      \r

      ## Current Behavior\r

      <!---\r

      \    If describing a bug, tell us what happens instead of the expected
      behavior.\r

      \    If suggesting a change/improvement, explain the difference from
      current behavior.\r

      -->\r

      \r

      \r

      I thought something like this would work\r

      \r

      `badgeContent={showbadge ? <MdMessage /> : null}`\r

      \r

      Unfortunately the background colour of the badge still shows\r

      \r

      Dont really want to end up like this\r

      \r

      ```jsx\r

      showbadge ? (\r

      \t<Badge badgeContent={<MdMessage />} color=\"error\">\r

      \t\t<Avatar>\r

      \t\t\t<FaUser/>\r

      \t\t</Avatar>\r

      \t</Badge>\r

      ) : (\r

      \t<Avatar>\r

      \t\t<FaUser/>\r

      \t</Avatar>\r

      )\r

      ```\r

      \r

      Could inject different styles, a bit messy\r

      \r

      ```jsx\r

      <Badge badgeContent={<MdMessage />} className={classNames({}, {\r

      \t[this.props.classes.badge_hidden]: showbadge,\r

      })}>\r

      \t<Avatar>\r

      \t\t<FaUser/>\r

      \t</Avatar>\r

      </Badge>\r

      \r

      const styleSheet = theme => ({\r

      \    badge_hidden: {\r

      \        display: \"none\",\r

      \    },\r

      });\r

      ```\r

      \r

      \r

      ## Context\r

      <!---\r

      \    How has this issue affected you? What are you trying to accomplish?\r

      \    Providing context helps us come up with a solution that is most
      useful in the real world.\r

      -->\r

      \r

      \r

      Thoughts on adding a boolean property to hide the badge (default would be
      to show it)\r

      \r

      ```jsx\r

      <Badge disabled={!showbadge} badgeContent={<MdMessage />}
      color=\"error\">\r

      \t<Avatar>\r

      \t\t<FaUser/>\r

      \t</Avatar>\r

      </Badge>\r

      ```\r

      \r

      \r

      And that would just not render this line\r

      https://github.com/mui-org/material-ui/blob/v1-beta/src/Badge/Badge.js#L68\
      \r

      \r

