  - id: serverless-6534
    repo_id: serverless-6534
    title: SWE-PolyBench serverless__serverless-6534
    type: bug_fix
    difficulty: medium
    prompt: "Wider `logs:CreateLogStream`/`logs:PutLogEvents` permissions in policy
      for Lambda functions with manual names (v1.45.1)

      <!--\r

      1. If you have a question and not a bug report please ask first at
      http://forum.serverless.com\r

      2. Please check if an issue already exists. This bug may have already been
      documented\r

      3. Check out and follow our Guidelines:
      https://github.com/serverless/serverless/blob/master/CONTRIBUTING.md\r

      4. Fill out the whole template so we have a good overview on the issue\r

      5. Do not remove any section of the template. If something is not
      applicable leave it empty but leave it in the Issue\r

      6. Please follow the template, otherwise we'll have to ask you to update
      it\r

      -->\r

      \r

      # This is a Bug Report\r

      \r

      ## Description\r

      \r

      * What went wrong?\r

      \r

      \   When a service contains only custom named functions, the policies for
      `logs:CreateLogStream` and `logs:PutLogEvents` created using v1.45.1 have
      a wider set of permissions than they previously did with v1.44.1.\r

      \r

      \   ### Resource access allowed when using v1.44.1\r

      \r

      \   * `logs:CreateLogStream`:\r

      \      *
      `arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/a\
      ws/lambda/log-group-policy-custom-named-fn:*`\r

      \   * `logs:PutLogEvents`:\r

      \      *
      `arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/a\
      ws/lambda/log-group-policy-custom-named-fn:*:*`\r

      \r

      \r

      \   ### Resource access allowed when using v1.45.1\r

      \r

      \   * `logs:CreateLogStream`:\r

      \      *
      `arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/a\
      ws/lambda/log-group-policy-dev*:*`\r

