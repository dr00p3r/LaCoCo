  - id: svelte-1116
    repo_id: svelte-1116
    title: SWE-PolyBench sveltejs__svelte-1116
    type: bug_fix
    difficulty: medium
    prompt: "can't supply store to nested components server side

      Hey, I'm trying to pass a store to a nested component which works well
      ordinarily, but it fails when server rendering it.\r

      \r

      E.g. I have a manage account page like so:\r

      ```html\r

      <div class=\"page\">\r

      \    <h1>Manage Account</h1>\r

      \r

      \    <div>\r

      \        <h3>Two Factor Auth</h3>\r

      \        <TwoFactorAuth />\r

      \    </div>\r

      </div>\r

      \r

      <style>\r

      \    .page {\r

      \        width: 400px;\r

      \        margin: 50px auto;\r

      \    }\r

      </style>\r

      \r

      <script>\r

      \    import TwoFactorAuth from './_components/TwoFactorAuth';\r

      \r

      \    export default {\r

      \        components: {\r

      \            TwoFactorAuth,\r

      \        },\r

      \    }\r

      </script>\r

      ```\r

      \r

      And in the TwoFactorAuth component, using a store via
      [svelte-redux](https://github.com/UnwrittenFun/svelte-redux)\r

      ```html\r

      {{#if $hasTwoFactor}}\r

      <div>yay its enabled</div>\r

      {{else}}\r

      <div>oh no its not enabled</div>\r

      {{/if}}\r

      \r

      <script>\r

      \    import { connect } from '../../_redux';\r

      \r

      \    export default {\r

      \        store: connect(state => ({\r

      \            hasTwoFactor: state.user && state.user.hasTwoFactor,\r

      \        })),\r

      \    }\r

      </script>\r

      ```\r

      \r

      As mentioned this fails on the server side, but not when navigation to the
      page on the client side.\r

      \r

      I dug into the generated code a bit and I see it generates the template
      like so:\r

      ```js\r

      return `<div class=\"page\" svelte-1782208320>\r

      \    <h1>Manage Account</h1>\r

      \r

      \    <div>\r

      \        <h3>Two Factor Auth</h3>\r

      \        ${__WEBPACK_IMPORTED_MODULE_0__components_TwoFactorAuth__[\"a\"
      /* default */]._render(__result, {}, { store: options.store })}\r

      \    </div>\r

      </div>`\r

      ```\r

      \r

      This is bypassing `render` where the store would be initialised
      ordinarily, and is instead just passing the parent store.\r

      \r

      It errors on the following line in the TwoFactorAuth's `_render` method,
      as the store is undefined\r

      ```js\r

      state = Object.assign(options.store._init([\"hasTwoFactor\"]), state);\r

      ```\r

      ```\r

      Cannot read property '_init' of undefined\r

      ```"
