    type: bug_fix
    difficulty: medium
    prompt: "Backticks not auto-closing for tagged template literals

      Issue Type: <b>Bug</b>\r

      \r

      When working with tagged template literals in JS and JSX
      (styled-components is my use case), the backticks used to auto-close when
      typed, but that recently changed. The big issue though is that if you go
      into a multi-line literal, and then try to type the closing backtick,
      vscode inserts two backticks, leaving you with three.\r

      \r

      For example if I type:\r

      \r

      ```\r

      const Button = styled.button`\r

      ```\r

      \r

      I would expect to have the closing tick automatically inserted and the
      cursor in between them. Instead it just stops there. If I then go on to
      enter some css and then manually enter the closing backtick, I get:\r

      \r

      ```\r

      const Button = styled.button`\r

      \  background: papayawhip;\r

      \  color: green;\r

      ``\r

      ```\r

      \r

      I then have to manually delete the third backtick, as if I delete the
      second, the whole pair is deleted because of the auto-close rules.\r

      \r

      I have verified this is happening on Mac and Windows 10, with extensions
      enabled and disabled, and in the Insiders build.\r

      \r

      VS Code version: Code 1.28.1 (3368db6750222d319c851f6d90eb619d886e08f5,
      2018-10-11T18:07:48.477Z)\r

      OS version: Darwin x64 18.0.0\r

