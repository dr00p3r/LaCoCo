      \r

      1. What is the use case that should be solved. The more detail you
      describe this in the easier it is to understand for us.\r

      \r

      We  export swagger.yaml from AWS API Gateway resources, and generate
      client library using
      [go-swagger](https://github.com/go-swagger/go-swagger) with the exported
      swagger.yaml. [When exporting to
      swagger.yaml](https://docs.aws.amazon.com/apigateway/latest/developerguid\
      e/api-gateway-export-api.html), AWS maps AWS::ApiGateway::Method's
      OperationName property to Swagger's [OperationId
      field](https://swagger.io/docs/specification/paths-and-operations/). \r

      \r

      When operationid is not present on swagger.yaml, go-swagger generates
      function name using combination of method, path, etc, resulting to a very
      long function name - such as
      `GetGraphdashboardQuerydsOrganizationIntegrationIDMeasurementMeasureqry`
      for example.\r

      \r

      Since we are unable to set OperationName on serverless.yaml's http event,
      we are unable to set shorter name to the generated function.\r

      \r

      OperationId is also used by other client code generation swagger tool, so
      this should also be applicable to those tools.\r

      \r

      1. **Optional:** If there is additional config how would it look\r

      her\r

      ```\r

      \      - http:\r

      \          path: /integrations/\r

      \          method: post\r

      \          operationName: CreateIntegration\r

      \          documentation:\r

      \            summary: Creates a single integration\r

      \            description: Creates a single integration\r

      \            requestModels:\r

      \               \"application/json\": Integration\r

      \            methodResponses:\r

      \              - statusCode: '200'\r

      \                responseModels:\r

      \                  \"application/json\": Integration\r

      ```\r

      \r

      Similar or dependent issues:\r

      https://github.com/serverless/serverless/issues/5530"
