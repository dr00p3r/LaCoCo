  - id: svelte-1095
    repo_id: svelte-1095
    title: SWE-PolyBench sveltejs__svelte-1095
    type: bug_fix
    difficulty: medium
    prompt: "case-sensitivity of SVG viewBox likely to cause silent errors

      In most 'try online' tools, the SVG `viewBox` attribute is handled the
      same whether properly camel-cased or not (`viewbox`). Svelte only
      recognizes `viewBox`. This can make it difficult for developers new to SVG
      - especially when they are starting with random sample code from
      blogs/tutorials - as improper use simply doesn't show up. Either an
      compile-time warning or acceptance of both variants would be helpful.\r

      \r

      Example:\r

      When I try to render `<svg viewbox=\"-250 -250 500 500\">` with the
      [Svelte](https://svelte.technology/repl?version=1.50.0&gist=3547a556f7fcd\
      f284516a39d24fbff24), my image is cutoff. Whereas on W3Schools or
      [CodePen](https://codepen.io/anon/pen/opWRbY), it renders fine, indicating
      that `width` and `height` aren't inherently mandatory. I had the same
      results testing locally and with REPL.\r

      \r

      When I try `<svg width=500 height=500 viewbox=\"-250 -250 500 500\">` it
      will adjust the size correctly, but doesn't respect the viewbox.\r

      \r

      Since I started with pasting a blog example, I mistakenly thought svelte
      couldn't handle viewbox."
    deterministic_input:
