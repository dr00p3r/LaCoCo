          <:Self heading=\"{{subheading}}\" />\r

          {{/if}}\r

          ```\r

          \r

          When the first letter of the component base name passed to `compile`
          starts with a lowercase letter, the output code includes:\r

          \r

          ```js\r

          var component = new component({\r

          \ttarget: null,\r

          \t_root: component._root || component,\r

          \tdata: { heading: root.subheading }\r

          });\r

          ```\r

          \r

          The resulting runtime error looks like:\r

          ```\r

          Uncaught TypeError: component is not a constructor\r

          \    at render_if_block_0 (component-bundle.js:63)\r

          \    at render_main_fragment (component-bundle.js:22)\r

          \    at new component (component-bundle.js:107)\r

          \    at index.html:10\r

          ```"
      oracle_input: null
      embedding_input: >-
