  - id: svelte-510
    repo_id: svelte-510
    title: SWE-PolyBench sveltejs__svelte-510
    type: bug_fix
    difficulty: medium
    prompt: "Static else block references should be nulled out

      [REPL](https://svelte.technology/repl?version=1.17.0&gist=2d001621f22badc\
      c9d6f596b4163f559) — the reference to the removed else block needs to be
      nulled out:\r

      \r

      ```diff\r

      if ( each_block_value.length ) {\r

      -  if ( each_block_else ) each_block_else.destroy( true );\r

      +  if ( each_block_else ) {\r

      +    each_block_else.destroy( true );\r

      +    each_block_else = null;\r

      +  }\r

      } else if ( !each_block_else ) {\r

      \  each_block_else = create_each_block_else( root, component );\r

      \  each_block_else.mount( each_block_anchor.parentNode, each_block_anchor
      );\r

      }\r

      ```"
    deterministic_input:
      retrieval_input:
        query: "Static else block references should be nulled out

          [REPL](https://svelte.technology/repl?version=1.17.0&gist=2d001621f22\
          badcc9d6f596b4163f559) — the reference to the removed else block needs
          to be nulled out:\r

          \r

          ```diff\r

          if ( each_block_value.length ) {\r

          -  if ( each_block_else ) each_block_else.destroy( true );\r

          +  if ( each_block_else ) {\r

          +    each_block_else.destroy( true );\r

          +    each_block_else = null;\r

          +  }\r

          } else if ( !each_block_else ) {\r

          \  each_block_else = create_each_block_else( root, component );\r

          \  each_block_else.mount( each_block_anchor.parentNode,
          each_block_anchor );\r

          }\r

          ```"
      oracle_input: null
      embedding_input: >-
        Static else block references should be nulled out

        REPL — the reference to the removed else block needs to be nulled out:


        ```diff

        if ( each_block_value.length ) {

        -  if ( each_block_else ) each_block_else.destroy( true );

        +  if ( each_block_else ) {

        +    each_block_else.destroy( true );

        +    each_block_else = null;

        +  }

        } else if ( !each_block_else ) {
          each_block_else = create_each_block_else( root, component );
          each_block_else.mount( each_block_anchor.parentNode, each_block_anchor );
