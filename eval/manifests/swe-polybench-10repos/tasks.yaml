      \  hello:\r

      \    handler: handler.hello\r

      \    events:\r

      \      - http:\r

      \          method: GET\r

      \          path: hello\r

      \          integration: lambda\r

      ```\r

      \r

      ```\r

      // handler.js\r

      'use strict';\r

      \r

      module.exports.hello = async (event) => {\r

      \  return \"hello\";\r

      };\r

      ```\r

