  - id: serverless-7277
    repo_id: serverless-7277
    title: SWE-PolyBench serverless__serverless-7277
    type: bug_fix
    difficulty: medium
    prompt: "Redrive Policy not properly referencing queue

      \r

      \r

      ## Description\r

      \r

      Recentely, I have been able to test serverless 1.62 which includes the
      option to use redriverPolicy for sns events. However, when I submited a PR
      for that feature, I overlooked the param specificacion format on the
      queuePolicy that is created. To be more specific, the Resource part needs
      to be an ARN but the Queue needs to be defined by URL.\r

      ````\r

      Resource: event.sns.redrivePolicy.deadLetterTargetArn -> should be a
      Fn::GetAtt [deadLetterTarget, Arn]\r

      ````\r

      \r

      ````\r

      Queues: [event.sns.redrivePolicy.deadLetterTargetArn], -> should be a Ref:
      deadLetterTarget\r

      ````\r

      \r

      This translates in using GetAtt Arn for one thing and Ref for the other,
      while now both use the ARN (which leads to deployment errors). Also, the
      documentation says that Ref can be used which is wrong since it would only
      provide one of the needed values.\r

      \r

      In this case, what I think would be easier is just to pass the queue
      resource name to the sns event redrivepolicy section (like myDLQ), and
      build the GetAtt and Ref inside.\r

      Other solutions would involve more complex things like trying to generate
      the url from the Arn. I'm open to whatever you think is best and will
      start a PR as soon as there's consensus\r

      \r

      #7239"
