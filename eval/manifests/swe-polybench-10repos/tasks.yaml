      }\r

      \r

      ```\r

      \r

      Lambda policy **after** applying workaround:\r

      ```\r

      aws lambda get-policy --function-name test-dev-hello  \r

      {\r

      \    \"Policy\":
      \"{\\\"Version\\\":\\\"2012-10-17\\\",\\\"Id\\\":\\\"default\\\",\\\"Stat\
      ement\\\":[{\\\"Sid\\\":\\\"test-dev-HelloLambdaPermissionApiGateway-T1A0\
      1LP3JK5R\\\",\\\"Effect\\\":\\\"Allow\\\",\\\"Principal\\\":{\\\"Service\\\
      \":\\\"apigateway.amazonaws.com\\\"},\\\"Action\\\":\\\"lambda:InvokeFunc\
      tion\\\",\\\"Resource\\\":\\\"arn:aws:lambda:eu-central-1:123:function:te\
      st-dev-hello\\\",\\\"Condition\\\":{\\\"ArnLike\\\":{\\\"AWS:SourceArn\\\
      \":\\\"arn:aws:execute-api:eu-central-1:123:z9qb5x6fnb/*/*\\\"}}},{\\\"Sid\
      \\\":\\\"653c0028-bc43-43b0-84d5-f8c3ae45d8f4\\\",\\\"Effect\\\":\\\"Allow\
      \\\",\\\"Principal\\\":{\\\"Service\\\":\\\"apigateway.amazonaws.com\\\"},\
      \\\"Action\\\":\\\"lambda:InvokeFunction\\\",\\\"Resource\\\":\\\"arn:aws\
      :lambda:eu-central-1:123:function:test-dev-hello\\\",\\\"Condition\\\":{\\\
      \"ArnLike\\\":{\\\"AWS:SourceArn\\\":\\\"arn:aws:execute-api:eu-central-1\
      :123:z9qb5x6fnb/*/GET/hello\\\"}}}]}\",\r

      \    \"RevisionId\": \"79bb00a3-93b9-4fd6-8bf6-95cb49a3818a\"\r

      }\r

      \r

      \r

      ```\r

      \r

      \r

      \r

      1. What did you do?\r

      - Created an API gateway with \r

      \r

      ```\r

      binaryMediaTypes:\r

      \      - '*/*'\r

      ```\r

      \r

      and a simple function with `integration: lambda`.\r

      \r

      1. What happened?\r

      - Calling the function returns 500.\r

      1. What should've happened?\r

      - Calling the function should return 200.\r

      1. What's the content of your `serverless.yml` file?\r

      \r

      ```\r

      service: test\r

      \r

      provider:\r

      \  name: aws\r

