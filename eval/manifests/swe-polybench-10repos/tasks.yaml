          the props of `FormControlLabel`, and there doesn't seem to be any
          option that allows me to change this. In fact, looking at the code of
          `FormControlLabel`, it seems to be hard-coded his way.\r

          \r

          I was able to work around this by setting the Label's direction to rtl
