    title: SWE-PolyBench mui__material-ui-12303
    type: bug_fix
    difficulty: medium
    prompt: "How to position Switch label to the left of the switch?

      - [x] This is a v1.x issue (v0.x is no longer maintained).\r

      - [x] I have searched the
      [issues](https://github.com/mui-org/material-ui/issues) of this repository
      and believe that this is not a duplicate.\r

      \r

      [The examples here](https://material-ui.com/demos/selection-controls/)
      demonstrate how to add a label to various forms of input, including the
      `Switch` component.\r

      \r

      Unfortunately, every single example on that page that includes a label has
      it positioned to the right of the component. I've looked through the props
      of `FormControlLabel`, and there doesn't seem to be any option that allows
      me to change this. In fact, looking at the code of `FormControlLabel`, it
      seems to be hard-coded his way.\r

      \r

      I was able to work around this by setting the Label's direction to rtl
      (and setting the Switch's direction back to ltr):\r

      ```\r

      import React from \"react\";\r

      import styled from \"react-emotion\";\r

      import FormControlLabel from \"@material-ui/core/FormControlLabel\";\r

      import Switch from \"@material-ui/core/Switch\";\r

      \r

      const StyledLabel = styled(FormControlLabel)`\r

      \  direction: ${({ rtl }) => rtl && \"rtl\"};\r

      \  margin: 0;\r

      `;\r

      \r

      const StyledSwitch = styled(Switch)`\r

      \  direction: ltr;\r

      `;\r

      \r

      export default ({ label, rtl, ...props }) => (\r

      \  <StyledLabel rtl={rtl} control={<StyledSwitch {...props} />}
      label={label} />\r

      );\r

      ```\r

      But this feels very hacky and potentially unstable to me.\r

      \r

      Is there any way I can have a `Switch` with its label on the left without
      resorting to `rtl` hacks? If so, can it please be documented? If not,
      please consider this a feature request."
