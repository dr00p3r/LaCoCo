    prompt: "[useMediaQuery] hydrationCompleted is true before hydrated

      - [x] The issue is present in the latest release.\r

      - [x] I have searched the
      [issues](https://github.com/mui-org/material-ui/issues) of this repository
      and believe that this is not a duplicate.\r

      \r

      ## Current Behavior 😯\r

      \r

      The `hydrationCompleted` variable in `useMediaQuery()` can become `true`
      before all  components in the document are actually hydrated.\r

      \r

      ## Expected Behavior 🤔\r

      \r

      `useMediaQuery()` should not have side-effects across components in a
      single document.\r

      \r

      ## Steps to Reproduce 🕹\r

      \r

      https://codesandbox.io/s/sweet-wilbur-5t0l6\r

      \r

      In this sandbox, please observe that `hydrationCompleted` is set to `true`
      after `ReactDOM.render()` (app 1) but before `ReactDOM.hydrate()` (app
      2).\r

      \r

      Unfortunately, I'm having trouble reproducing the visual bug in our app
      that caused us to take notice of this issue in the first place. I'll keep
      at it!\r

      \r

      ## Context 🔦\r

      \r

      The impact on our app is ``Prop `className` did not match`` warnings and
      mismatches between CSS class names.\r

      \r

      I'm able to work around the issue by:\r

      \r

      * changing the load order so the SSR component is hydrated first\r

      * manually resetting `hydrationCompleted` back to `false` after it's set
      to `true`\r

      * forcing the app to re-render (by interacting with the app)\r

      \r

      ## Your Environment 🌎\r

      \r

      | Tech        | Version |\r

      | ----------- | ------- |\r

      | Material-UI | v4.5.0  |\r

      | React       | v16.8.6        |"
