manifest_version: 1
kind: repositories
updated_at: "2026-07-07"

selection:
  description: >-
    Repositorios open source JavaScript/TypeScript con Node.js usados para
    evaluar LaCoCo en escenarios de recuperacion y generacion de codigo.
  inclusion_criteria:
    - "Open source"
    - "Ecosistema JavaScript/TypeScript con Node.js"
    - "Proyecto con pruebas automatizadas"
    - "Popularidad alta o relevancia tecnica para repos de librerias"
    - "Tamanos pequeno, mediano y grande"
  notes:
    - >-
      Los valores expected_loc son aproximaciones metodologicas usadas para
      clasificar el tamano. El pipeline debe calcular LOC reales en cada
      corrida.
    - >-
      Cuando framework_from_plan y framework_verified difieren, prevalece
      framework_verified para la ejecucion; framework_from_plan conserva la
      trazabilidad con el documento academico.

defaults:
  clone:
    depth: 0
    fetch_tags: true
    clean_before_task: true
    clean_command: "git reset --hard HEAD && git clean -fdx"
  runtime:
    node_version: ">=20"
    env:
      CI: "true"
      NO_COLOR: "1"
  install:
    timeout_ms: 2400000
  build:
    timeout_ms: 3600000
    optional: true
  test:
    timeout_ms: 900000
    run_before_generation: true
    run_after_generation: true
  lacoco_index:
    graph_db_name: "tensor.sqlite"
    vector_dir_name: "lancedb"
    generate_eval_tsconfig_when_missing: true
    eval_tsconfig_name: "tsconfig.lacoco-eval.json"

