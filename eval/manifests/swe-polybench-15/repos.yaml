  - id: material-ui-11451
    display_name: material-ui @ 04fae47
    url: https://github.com/mui/material-ui.git
    ref: 04fae47c2a876f38aacfae866d220ddcbb7358ef
    package_manager: npm
    install_command: npm install
    test_command: . /usr/local/nvm/nvm.sh && nvm use 14.21.3 && yarn cross-env
      NODE_ENV=test mocha packages/material-ui/src/ListItem/ListItem.test.js
      --reporter /testbed/custom-reporter.js --exit
    source_roots:
      - packages/material-ui/src
    tsconfig_candidates: []
    # mui es JS con .d.ts hermanos que ensombrecen el .js de implementación (donde
    # vive el gold). Excluir .d.ts hace que el .js sea la fuente indexada; resolución
    # node clásica para imports de directorio; jsx para las aristas de composición.
    lacoco_tsconfig_overrides:
      compilerOptions:
        jsx: react
        module: commonjs
        moduleResolution: node
      exclude:
        - "**/*.d.ts"
        - "**/*.test.js"
    language_scope:
      - javascript
      - typescript
