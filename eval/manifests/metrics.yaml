manifest_version: 1
kind: metrics
updated_at: "2026-07-05"

aggregation_policy:
  primary_average: "macro_by_task_then_repo"
  secondary_average: "micro_global"
  report_confidence_intervals: true
  bootstrap_iterations: 1000
  missing_data_policy:
    retrieval_without_patch_evidence: "exclude_gold_metrics_and_report_as_pending"
    retrieval_no_hit_mrr: "contributes_zero_task_still_counted"
    generation_timeout: "count_as_fail_for_m1_and_report_timeout"
    hallucination_unknown_symbol: "exclude_from_denominator_and_report_unknown"
  # K primario del resumen (aproxima el contexto realmente inyectado).
  ranking_cutoff_primary: 10
  # Barrido de K (curva cobertura/hit vs. tamaño de contexto). Se reporta en el JSON
  # por-celda (details.sweep) y en el benchmark-doctor, no en el resumen macro.
  ranking_cutoff_sweep:
    - 1
    - 3
    - 5
    - 10
    - 20

metrics:
  - id: M1
    name: "Pass@1 (regression)"
    role: "agent_outcome"
    dimension: "Generacion"
    stage: "generation"
    what_it_measures: >-
      Si el cambio generado por el agente restaura el repositorio a verde
      partiendo de un broken_state canonico. Citable como M1_regression_pass@1.
    formula: "passed_tasks / total_tasks"
    unit: "ratio"
    range:
      min: 0
      max: 1
    better: "higher"
    source: "automatic_tests"
    numerator: "Numero de tareas con baseline_failing_tests vacio tras el agente y test_exit_code == 0."
    denominator: "Numero de tareas ejecutadas para la combinacion repo x estrategia x agente."
    pass_condition:
      - "agent_exit_code == 0"
      - "patch_applied == true"
      - "test_exit_code == 0"
      - "baseline_failing_tests vacio tras el agente"
      - "no_manual_edit_after_agent == true"
    sub_metrics:
      - id: M1_regression_pass
        name: "M1 regression pass (citable)"
        definition: "baseline_failing_tests ⊆ tests_passing_post_agent ∧ test_exit_code == 0"
        citable: true
      - id: M1_grading_pass
        name: "M1 grading pass"
        definition: "Todos los grading_tests del task pasan tras el agente"
      - id: M1_target_pass
        name: "M1 target pass"
        definition: "test_exit_code == 0 sobre el comando target_tests completo"
      - id: M1_regression_introduced
        name: "M1 regression introduced failures"
        definition: "post_tests_failing − baseline_failing_tests (cuantos tests nuevos rompio el agente)"
        better: "lower"
    secondary_fields:
      - "tests_passed"
      - "tests_failed"
      - "tests_total"
      - "test_duration_ms"
      - "timeout"
      - "baseline_failing_tests"
      - "post_failing_tests"
      - "grading_tests_passed"
      - "regression_introduced_failures"

  - id: M2
    name: "Hallucination Rate"
    role: "agent_outcome"
    dimension: "Generacion"
    stage: "hallucination_detection"
    what_it_measures: >-
      Proporcion de llamadas a metodos, funciones, clases o constructores que no
      existen en el proyecto ni en la version instalada de las dependencias.
    formula: "invalid_calls / analyzable_calls"
    unit: "ratio"
    range:
      min: 0
      max: 1
    better: "lower"
    source: "static_analysis_on_generated_diff"
    numerator: "Llamadas invalidas detectadas en archivos modificados por el agente."
    denominator: "Llamadas analizables en el diff generado."
    unknown_policy: >-
      Expresiones dinamicas, valores any, index access y simbolos no resolubles
      se registran como unknown y no entran en el denominador principal.
    detector_requirements:
      - "Usar TypeScript Language Service o ts-morph sobre el repositorio con dependencias instaladas."
      - "Analizar solo archivos modificados en patch.diff."
      - "Resolver simbolos internos y node_modules."
      - "Registrar falsos positivos revisables."
    secondary_fields:
      - "invalid_calls"
      - "analyzable_calls"
      - "unknown_calls"
      - "invalid_symbols"
      - "files_analyzed"

  # --- Panel norte: tiempo y costo del agente (role: agent_outcome) ---------
  # El agente recibe el contexto YA inyectado (sin hook vivo), así que
  # AgentDurationMs excluye la recuperación. EndToEndMs = RetrievalOverheadMs
  # (retrieval.jsonl timings_ms.total; 0 para no_context) + AgentDurationMs, y es
  # la lectura justa de costo/tiempo frente a no_context. Informativas: no entran
  # a required_metrics (no definen pass/fail).

  - id: AgentDurationMs
    thesis_id: "M22"
    name: "Agent duration (ms)"
    role: "agent_outcome"
    dimension: "Eficiencia"
    stage: "generation"
    what_it_measures: >-
      Wall-clock del subproceso del agente (opencode). NO incluye recuperación (el
      contexto llega pre-inyectado en el prompt). Media y P95 por estrategia.
    formula: "mean/p95(agent_duration_ms)"
    unit: "milliseconds"
    better: "lower"
    source: "automatic_timing"

  - id: RetrievalOverheadMs
    thesis_id: "M23"
    name: "Retrieval overhead (ms)"
    role: "agent_outcome"
    dimension: "Eficiencia"
    stage: "retrieval"
    what_it_measures: >-
      Overhead pre-agente por celda = retrieval.jsonl timings_ms.total (sanitizer
      SLM + recuperación). 0 para no_context. Media por estrategia.
    formula: "mean(retrieval.timings_ms.total)"
    unit: "milliseconds"
    better: "lower"
    source: "automatic_timing"

  - id: EndToEndMs
    thesis_id: "M24"
    name: "End-to-end time (ms)"
    role: "agent_outcome"
    dimension: "Eficiencia"
    stage: "generation"
    what_it_measures: >-
      Costo real del flujo asistido = RetrievalOverheadMs + AgentDurationMs por
      celda. ΔE2E < 0 vs no_context = el contexto se paga solo. Media y P95.
    formula: "mean/p95(retrieval_overhead_ms + agent_duration_ms)"
    unit: "milliseconds"
    better: "lower"
    source: "automatic_timing"

  - id: CostUsd
    thesis_id: "M25"
    name: "Cost (USD)"
    role: "agent_outcome"
    dimension: "Eficiencia"
    stage: "generation"
    what_it_measures: >-
      Costo reportado por el proveedor (parseado del stdout de opencode). Media y
      total por estrategia, solo sobre celdas que lo reportan.
    formula: "mean/sum(cost_usd)"
    unit: "usd"
    better: "lower"
    source: "provider_reported"

  - id: TokensTotal
    thesis_id: "M26"
    name: "Agent tokens (total)"
    role: "agent_outcome"
    dimension: "Eficiencia"
    stage: "generation"
    what_it_measures: >-
      Tokens consumidos por el agente (input+output+reasoning+cache), sumados
      sobre los step_finish del stream de opencode. Eje de esfuerzo INDEPENDIENTE
      del costo: sirve cuando el proveedor/suscripción no reporta `cost`. ΔTokens
      < 0 vs no_context = el contexto ahorra esfuerzo del modelo. Media y suma.
    formula: "mean/sum(tokens.total)"
    unit: "tokens"
    better: "lower"
    source: "provider_reported"

  - id: ToolCalls
    thesis_id: "M27"
    name: "Agent tool-calls"
    role: "agent_outcome"
    dimension: "Eficiencia"
    stage: "generation"
    what_it_measures: >-
      Número de llamadas a herramientas del agente (read/grep/bash/edit/…),
      contadas de los eventos tool_use del stream de opencode. Automatiza el
      conteo manual de greps: el desglose `by_tool` da la media por herramienta,
      así cada reporte mira la que quiera (grep, bash, …). ΔToolCalls vs no_context.
    formula: "mean(tool_calls.total); by_tool = mean por herramienta"
    unit: "calls"
    better: "lower"
    source: "provider_reported"

  # --- Recuperación: gold_derived (contra patch-evidence gold) ---------------
  # El gold sale del PATCH de referencia (lib/patch-evidence-gold.ts), no del
  # grafo de LaCoCo, para evitar circularidad con estrategias graph-based. K
  # primario = aggregation_policy.ranking_cutoff_primary. `id` == MetricId del
  # motor (lib/metrics.ts); `thesis_id` es el número para el glosario de la tesis.

  - id: EditSiteHit
    thesis_id: "M14"
    name: "EditSiteHit@K"
    role: "gold_derived"
    gold_source: "patch_evidence"
    source: "patch_evidence_gold"
    dimension: "Recuperacion"
    stage: "retrieval"
    what_it_measures: >-
      Si en el top-K aparece el edit-site del patch, sea por archivo editado o por
      símbolo editado. Métrica binaria por celda; el resumen es la tasa de hit.
    formula: "any(edited_file ∈ top_k.files ∨ edited_symbol ∈ top_k.nodes)"
    unit: "ratio"
    range:
      min: 0
      max: 1
    better: "higher"
    gold_fields:
      - "tasks[].gold.patch_evidence.edited_files"
      - "tasks[].gold.patch_evidence.edited_symbols"

  - id: PatchEvidenceHit
    thesis_id: "M15"
    name: "PatchEvidenceHit@K"
    role: "gold_derived"
    gold_source: "patch_evidence"
    source: "patch_evidence_gold"
    dimension: "Recuperacion"
    stage: "retrieval"
    what_it_measures: >-
      Si en el top-K aparece CUALQUIER evidencia del patch (archivos/símbolos
      editados, tests tocados, imports/calls/types introducidos y sus
      definiciones). Excluye nodos externos/genéricos (lib#…): nunca cuentan.
    formula: "any(patch_evidence_element ∈ top_k, excluding external nodes)"
    unit: "ratio"
    range:
      min: 0
      max: 1
    better: "higher"

  - id: MRR
    thesis_id: "M16"
    name: "MRR (patch-evidence)"
    role: "gold_derived"
    gold_source: "patch_evidence"
    source: "patch_evidence_gold"
    dimension: "Recuperacion"
    stage: "retrieval"
    what_it_measures: >-
      Rank recíproco del PRIMER elemento de patch-evidence en el ranking.
    formula: "mean(1 / first_patch_evidence_rank)"
    unit: "ratio"
    range:
      min: 0
      max: 1
    better: "higher"
    no_hit_value: 0
    no_hit_policy: "contributes_zero_task_still_counted"
    rank_base: 1

  - id: EditSiteMRR
    thesis_id: "M17"
    name: "EditSiteMRR"
    role: "gold_derived"
    gold_source: "patch_evidence"
    source: "patch_evidence_gold"
    dimension: "Recuperacion"
    stage: "retrieval"
    what_it_measures: >-
      Rank recíproco del primer elemento ESTRICTAMENTE edit-site. Discrimina
      cuando un import trivial en rank 1 infla el MRR general pero el archivo
      editado aparece muy abajo.
    formula: "mean(1 / first_edit_site_rank)"
    unit: "ratio"
    range:
      min: 0
      max: 1
    better: "higher"
    no_hit_value: 0
    rank_base: 1

  - id: UsefulContextCoverage
    thesis_id: "M18"
    name: "UsefulContextCoverage@K"
    role: "gold_derived"
    gold_source: "patch_evidence"
    source: "patch_evidence_gold"
    dimension: "Recuperacion"
    stage: "retrieval"
    what_it_measures: >-
      Cobertura del conjunto completo de patch-evidence en top-K. El resumen es el
      agregado; el benchmark-doctor lo desglosa por estrato (edit_site / test /
      ref / definition). OJO: 1 − coverage NO es "ruido" (ver ExternalNoiseRate).
    formula: "|patch_evidence ∩ top_k| / |patch_evidence|"
    unit: "ratio"
    range:
      min: 0
      max: 1
    better: "higher"
    strata:
      - "edit_site"
      - "test"
      - "ref"
      - "definition"

  - id: ExternalNoiseRate
    thesis_id: "M19"
    name: "ExternalNoiseRate@K"
    role: "gold_derived"
    gold_source: "patch_evidence"
    source: "patch_evidence_gold"
    dimension: "Recuperacion"
    stage: "retrieval"
    what_it_measures: >-
      Proporción de nodos externos/genéricos (lib#… o node_modules) en el top-K.
      Acotado a externos, NO "todo lo que no es gold".
    formula: "|external_nodes ∩ top_k| / |top_k|"
    unit: "ratio"
    range:
      min: 0
      max: 1
    better: "lower"

  - id: Latency
    thesis_id: "M7"
    name: "Latency P95"
    dimension: "Eficiencia"
    stage: "retrieval"
    what_it_measures: >-
      Tiempo de respuesta en el percentil 95 para cada combinacion repo x tarea
      x estrategia sobre repeticiones controladas.
    formula: "percentile(total_latency_ms, 95)"
    unit: "milliseconds"
    range:
      min: 0
      max: null
    better: "lower"
    source: "automatic_timing"
    repetitions: 100
    warmup_repetitions: 5
    measured_segments:
      - "sanitize_ms"
      - "retrieval_ms"
      - "aggregation_ms"
      - "injection_ms"
      - "total_ms"
    timing_requirements:
      - "Usar performance.now() o temporizador monotonic equivalente."
      - "Excluir instalacion, indexacion y ejecucion del agente externo."
      - "Reportar por separado cache cold y cache warm si se implementa."

  # --- Recuperación: DIAGNÓSTICO de grafo (nunca definen gold ni pass/fail) ---
  # El grafo se usa como diagnóstico de cobertura/distancia, no como fuente de
  # verdad. El benchmark-doctor los computa; NO pueden entrar a required_metrics.

  - id: GraphDistanceProfile
    thesis_id: "M20"
    name: "GraphDistanceProfile@K"
    role: "diagnostic"
    dimension: "Cobertura"
    stage: "retrieval"
    what_it_measures: >-
      Distribución de distancias en el grafo entre los nodos recuperados y el
      edit-site. Con patches multi-archivo la distancia del resumen es la MÍNIMA a
      cualquier edit-site; el doctor reporta el perfil por edit-site.
    formula: "distribution(min_graph_distance(retrieved_node, edit_sites))"
    unit: "hops"
    better: "lower"
    source: "graph_diagnostic"

  - id: GraphNeighborhoodCoverage
    thesis_id: "M21"
    name: "GraphNeighborhoodCoverage@K"
    role: "diagnostic"
    dimension: "Cobertura"
    stage: "retrieval"
    what_it_measures: >-
      Cobertura de los vecinos CALLS/REFERENCES/DECLARES del edit-site en top-K
      (sustituye el rol del viejo Multi-hop Recall, ahora como diagnóstico).
    formula: "|graph_neighbors(edit_site) ∩ top_k| / |graph_neighbors(edit_site)|"
    unit: "ratio"
    better: "higher"
    source: "graph_diagnostic"

  # --- Legacy: retiradas del resumen y de los gates (reproducibilidad histórica) --
  - id: LEGACY_P5
    name: "Precision@5 (legacy)"
    role: "legacy"
    gold_source: "graph_derived"
    dimension: "Recuperacion"
    stage: "retrieval"
    what_it_measures: "Retirada: gold graph-derived con circularidad estructural."
    formula: "|relevant_nodes ∩ retrieved_top_5| / 5"
    unit: "ratio"
    better: "higher"
    source: "legacy_graph_gold"

  - id: LEGACY_R5
    name: "Recall@5 (legacy)"
    role: "legacy"
    gold_source: "graph_derived"
    dimension: "Recuperacion"
    stage: "retrieval"
    what_it_measures: "Retirada: gold graph-derived con circularidad estructural."
    formula: "|relevant_nodes ∩ retrieved_top_5| / |relevant_nodes|"
    unit: "ratio"
    better: "higher"
    source: "legacy_graph_gold"

  - id: M8
    name: "Grounding Candidate Recall@20"
    dimension: "Traduccion"
    stage: "grounding"
    formula: "|relevant_terms intersect candidate_terms_top_20| / |relevant_terms|"
    unit: "ratio"
    better: "higher"
    source: "manual_translation_gold"

  - id: M9
    name: "Translation Term Precision"
    dimension: "Traduccion"
    stage: "sanitization"
    formula: "|relevant_terms intersect clean_query_terms| / |clean_query_terms|"
    unit: "ratio"
    better: "higher"
    source: "manual_translation_gold"

  - id: M10
    name: "Translation Term Recall"
    dimension: "Traduccion"
    stage: "sanitization"
    formula: "|relevant_terms intersect clean_query_terms| / |relevant_terms|"
    unit: "ratio"
    better: "higher"
    source: "manual_translation_gold"

  - id: M11
    name: "Unsupported Term Rate"
    dimension: "Traduccion"
    stage: "sanitization"
    formula: "initial_unsupported_clauses / all_observed_clauses"
    unit: "ratio"
    better: "lower"
    source: "grounding_diagnostics"

  - id: M12
    name: "Classifier Repair Count"
    dimension: "Robustez"
    stage: "sanitization"
    formula: "mean(repair_count)"
    unit: "count"
    better: "lower"
    source: "grounding_diagnostics"

  - id: M13
    name: "Grounding Latency"
    dimension: "Eficiencia"
    stage: "grounding"
    formula: "mean(grounding_duration_ms)"
    unit: "milliseconds"
    better: "lower"
    source: "automatic_timing"

quality_gates:
  # Invariante (validada por load-manifests.ts): ninguna métrica con rol
  # `diagnostic` o `legacy` puede aparecer en `required_metrics`. El norte es el
  # agente (M1/M2); el retrieval gold_derived explica la calidad de contexto.
  official_run:
    required_metrics:
      - M1
      - M2
      - EditSiteHit
      - PatchEvidenceHit
      - UsefulContextCoverage
    min_ready_tasks: 20
    fail_if_any_task_missing_gold_for_retrieval: true
    fail_if_agent_not_available: true
    fail_if_repo_baseline_tests_fail: true

output_files:
  retrieval_jsonl: "retrieval.jsonl"
  generation_jsonl: "generation.jsonl"
  hallucinations_jsonl: "hallucinations.jsonl"
  summary_csv: "summary.csv"
  summary_markdown: "summary.md"
  thesis_tables_markdown: "tables-for-thesis.md"
  semantic_profile_metrics_json: "semantic-profile-metrics.json"
  semantic_profile_summary_csv: "semantic-profile-summary.csv"
  semantic_profile_summary_markdown: "semantic-profile-summary.md"
