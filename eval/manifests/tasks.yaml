manifest_version: 1
kind: tasks
updated_at: "2026-07-08"

# NOTA sobre status=legacy: las tareas zod-001/002, inversify-001/002 y
# rxjs-001/002 son LEGACY y NO se usan en el pipeline production.
# Su gold dependia de `broken_patch` + `baseline_failing_tests` anotados a
# mano (fragil y costoso de mantener). El pipeline nuevo usa swe-polybench
# (`eval/manifests/swe-polybench/`) como unica fuente de verdad para M1-M7.
# Las tareas legacy se conservan aqui para:
#   1. Reproducibilidad de los informes historicos (2026-07-05-*,
#      2026-07-06-regression-pilot, 2026-07-07-grounding-ab-zod).
#   2. Tests del harness (`metrics.test.ts`, `gold.test.ts`).
# El campo `status: legacy` se preserva via [key: string]: unknown en
# TaskDefinition; loadManifests no lo valida ni lo rechaza.

annotation_policy:
  gold_source: "manual"
  do_not_invent_gold: true
  ready_status_required_for_m3_m6: true
  translation_gold_source: "manual"
  do_not_promote_grounding_candidates_to_gold: true
  node_id_format: "<filepath>#<symbol_or_node_name>"
  multihop_definition: "relevant node with shortest graph distance >= 2 from the primary anchor"
  annotation_steps:
    - "Leer la tarea y localizar los archivos que un mantenedor tocaria."
    - "Ejecutar LaCoCo inspect/retrieve para explorar candidatos, sin usarlos como unica verdad."
    - "Confirmar nodos relevantes mediante lectura manual del codigo y pruebas."
    - "Marcar multihop_nodes calculando distancia en el grafo LaCoCo."
    - "Registrar target_tests que validen la tarea."

defaults:
  enabled: true
  gold:
    status: "pending_manual_annotation"
    relevant_nodes: []
    multihop_nodes: []
    annotation_notes: "Pendiente de anotacion manual antes de corrida oficial."
  generation:
    allow_test_edits: false
    allow_dependency_changes: false
    expected_patch_size: "small_to_medium"
  retrieval:
    top_k: 50
    use_deterministic_input: true

# Estas tareas son semillas experimentales. Sirven para construir prompts,
# ejecutar dry-runs y guiar la anotacion manual. No deben reportarse como
# resultados oficiales mientras gold.status no sea ready.
tasks:
  - id: zod-001
    status: legacy
    repo_id: zod
    title: "Rastrear validacion de strings no vacios"
    type: "feature_or_behavior_change"
    difficulty: "medium"
    prompt: >-
      Implementa una mejora pequena en la validacion de strings para permitir
      un helper que rechace cadenas vacias luego de aplicar trim, preservando el
      estilo de APIs existentes y mensajes de error coherentes.
    deterministic_input:
      retrieval_input:
        query: "reject empty string after trim helper preserve existing validation error style"
      oracle_input:
        query: '"ZodString" OR "trim" OR "nonempty" OR "ZodStringCheck" OR "addIssueToContext"'
      embedding_input: "Implement helper for trimmed non-empty string validation in Zod v3"
      intent: "create"
      dimensions:
        - "CPG"
        - "DTG"
    expected_areas:
      - "string schemas"
      - "error issue construction"
      - "tests for string parsing"
    target_tests:
      - "pnpm vitest run packages/zod/src/v3/tests/string.test.ts"
    gold:
      status: "ready"
      patch_evidence:
        source: patch
        edited_files:
          - "packages/zod/src/v3/types.ts"
        edited_symbols:
          - file: "packages/zod/src/v3/types.ts"
            symbol: "ZodString"
            kind: "class"
          - file: "packages/zod/src/v3/types.ts"
            symbol: "ZodString.trim"
            kind: "method"
        touched_tests: []
        introduced_refs: []
        resolved_definitions: []
        resolution:
          fell_back_to_file_level: false
          unresolved_refs: []
      primary_anchor: "packages/zod/src/v3/types.ts#ZodString"
      relevant_nodes:
        - "packages/zod/src/v3/types.ts#ZodString"
        - "packages/zod/src/v3/types.ts#ZodString.nonempty"
        - "packages/zod/src/v3/types.ts#ZodString.trim"
        - "packages/zod/src/v3/types.ts#ZodString.min"
        - "packages/zod/src/v3/types.ts#ZodString._addCheck"
        - "packages/zod/src/v3/types.ts#ZodString._parse"
        - "packages/zod/src/v3/types.ts#ZodStringCheck"
        - "packages/zod/src/v3/types.ts#ZodStringDef"
        - "packages/zod/src/v3/helpers/parseUtil.ts#addIssueToContext"
        - "packages/zod/src/v3/ZodError.ts#ZodIssueCode"
      multihop_nodes:
        - "packages/zod/src/v3/types.ts#ZodStringCheck"
        - "packages/zod/src/v3/types.ts#ZodStringDef"
        - "packages/zod/src/v3/helpers/parseUtil.ts#addIssueToContext"
        - "packages/zod/src/v3/ZodError.ts#ZodIssueCode"
      annotation_notes: >-
        Gold anotado contra el grafo indexado de zod v3.25.76 (commit 7baee4e17,
        run 2026-07-04-9ee37a5-pilot). node_id = <ruta_absoluta>#<simbolo>.
        Anchor primario: ZodString. La API existente a imitar es nonempty() (= .min(1));
        trim() agrega el check "trim" y _addCheck lo anexa de forma inmutable; _parse
        aplica los checks (trim muta input.data y min emite too_small via addIssueToContext).
        Tras corregir aliases, miembros y referencias del extractor, _parse es vecino
        directo (d=1). multihop_nodes verificados a distancia BFS >=2: ZodStringCheck
        (d=7), ZodStringDef (d=6), parseUtil#addIssueToContext (d=2) y ZodIssueCode
        (d=5). target_tests verificado verde (110 tests).
    regression:
      base_commit: "7baee4e17f86f4017e09e12b0acdee36a5b1c087"
      broken_patch: "regression/zod-001.broken.diff"
      grading_tests:
        - "trim"
    tags:
      - "pilot"
      - "string"
      - "validation"

  - id: zod-002
    status: legacy
    repo_id: zod
    title: "Inspeccionar interaccion entre object shape y strictness"
    type: "bugfix"
    difficulty: "medium"
    prompt: >-
      Corrige un comportamiento hipotetico donde la configuracion strict de un
      objeto no se mantiene correctamente al derivar variantes parciales del
      schema. Mantener compatibilidad con las pruebas existentes.
    deterministic_input:
      retrieval_input:
        query: "strict object rejecting unknown properties not preserved when deriving partial schema"
      oracle_input:
        query: '"ZodObject" OR "strict" OR "partial" OR "unknownKeys" OR "deepPartialify"'
      embedding_input: "Fix strict object behavior when deriving partial object schemas"
      intent: "debug"
      dimensions:
        - "CPG"
        - "DTG"
    expected_areas:
      - "object schemas"
      - "unknown keys policy"
      - "partial/deep partial derivation"
    target_tests:
      - "pnpm vitest run packages/zod/src/v3/tests/partials.test.ts"
      - "pnpm vitest run packages/zod/src/v3/tests/object.test.ts"
    gold:
      status: "ready"
      primary_anchor: "packages/zod/src/v3/types.ts#ZodObject"
      relevant_nodes:
        - "packages/zod/src/v3/types.ts#ZodObject"
        - "packages/zod/src/v3/types.ts#ZodObject.partial"
        - "packages/zod/src/v3/types.ts#ZodObject.deepPartial"
        - "packages/zod/src/v3/types.ts#deepPartialify"
        - "packages/zod/src/v3/types.ts#ZodObject.required"
        - "packages/zod/src/v3/types.ts#ZodObject.strict"
        - "packages/zod/src/v3/types.ts#ZodObject._parse"
        - "packages/zod/src/v3/types.ts#ZodObjectDef"
        - "packages/zod/src/v3/types.ts#UnknownKeysParam"
        - "packages/zod/src/v3/helpers/parseUtil.ts#addIssueToContext"
        - "packages/zod/src/v3/ZodError.ts#ZodIssueCode"
      multihop_nodes:
        - "packages/zod/src/v3/types.ts#ZodObjectDef"
        - "packages/zod/src/v3/types.ts#UnknownKeysParam"
        - "packages/zod/src/v3/helpers/parseUtil.ts#addIssueToContext"
        - "packages/zod/src/v3/ZodError.ts#ZodIssueCode"
      annotation_notes: >-
        Gold anotado contra el grafo indexado de zod v3.25.76 (commit 7baee4e17,
        run 2026-07-04-9ee37a5-pilot). node_id = <ruta_absoluta>#<simbolo>.
        Anchor primario: ZodObject. El strict se guarda como _def.unknownKeys="strict"
        (metodo strict()) y se aplica en _parse (rama unknownKeys==="strict" que emite
        ZodIssueCode.unrecognized_keys via addIssueToContext). partial()/required() hacen
        new ZodObject({...this._def, shape}) preservando unknownKeys; deepPartial() delega
        en la funcion deepPartialify (locus del bug si no propaga _def). Tras corregir el
        extractor, _parse y deepPartial son vecinos directos (d=1). multihop_nodes a
        distancia BFS >=2: ZodObjectDef (d=4), UnknownKeysParam (d=2),
        parseUtil#addIssueToContext (d=2) y ZodIssueCode (d=3).
        target_tests (partials.test.ts + object.test.ts) verificados verdes (104 tests).
    regression:
      base_commit: "7baee4e17f86f4017e09e12b0acdee36a5b1c087"
      broken_patch: "regression/zod-002.broken.diff"
      grading_tests:
        - "strict"
        - "strictcreate"
        - "constructor key"
    tags:
      - "pilot"
      - "object"
      - "bugfix"

