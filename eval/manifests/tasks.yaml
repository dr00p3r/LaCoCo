        - "src/internal/scheduler/AsyncAction.ts#AsyncAction.schedule"
        - "src/internal/scheduler/AsyncAction.ts#AsyncAction.requestAsyncId"
      multihop_nodes:
        - "src/internal/util/isScheduler.ts#isScheduler"
        - "src/internal/Scheduler.ts#Scheduler"
        - "src/internal/Scheduler.ts#Scheduler.schedule"
        - "src/internal/scheduler/AsyncScheduler.ts#AsyncScheduler"
        - "src/internal/scheduler/AsyncAction.ts#AsyncAction"
        - "src/internal/scheduler/AsyncAction.ts#AsyncAction.schedule"
        - "src/internal/scheduler/AsyncAction.ts#AsyncAction.requestAsyncId"
      annotation_notes: >-
        Gold anotado contra el grafo indexado de rxjs 7.8.2 (commit e5351d02e,
        run 2026-07-04-9ee37a5-pilot). node_id = <ruta_absoluta>#<simbolo>.
        Anchor primario: delay. delay(due, scheduler = asyncScheduler) construye
        timer(due, scheduler) y delega en delayWhen. timer usa isScheduler para respetar
        el scheduler recibido y programa la emision diferida via Scheduler.schedule ->
        AsyncScheduler -> AsyncAction.schedule -> AsyncAction.requestAsyncId (setInterval,
        la temporizacion por defecto). El bug ocurre si la ruta ignora el scheduler param
        y cae al asyncScheduler global. Tras corregir el extractor, delayWhen y timer son
        vecinos directos (d=1), e isScheduler (d=2), Scheduler (d=2), AsyncScheduler
        (d=2), AsyncAction (d=2), Scheduler.schedule (d=3), AsyncAction.schedule (d=3)
        y AsyncAction.requestAsyncId (d=3) son multihop. asyncScheduler y su alias async
        ahora generan nodos VARIABLE conectados, aunque no forman parte del gold de símbolos
        necesarios para modificar esta ruta.
        target_tests verificado verde (delay-spec.ts, 16 tests, usa TestScheduler).
    tags:
      - "pilot"
      - "scheduler"
      - "multi-hop"
      - "regression_excluded"

