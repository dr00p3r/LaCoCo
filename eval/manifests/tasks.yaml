        temprana y consistente se anadiria aqui imitando el patron existente de toSelf()
        (d=2), que ya lanza cuando el serviceIdentifier no es newable, usando
        InversifyContainerError (d=3) + InversifyContainerErrorKind y stringifyServiceIdentifier
        (d=6) para el mensaje. Debe seguir aceptando los tipos validos de ServiceIdentifier
        (d=10): string, symbol, Newable/Function y LazyServiceIdentifier (d=12) detectado via
        LazyServiceIdentifier.is (d=13). to() (d=2) consume el serviceIdentifier al binding y
        getBindingId (d=3) genera su id. multihop_nodes verificados a distancia BFS >=2:
        to, toSelf, getBindingId, InversifyContainerError, stringifyServiceIdentifier,
        ServiceIdentifier, LazyServiceIdentifier, LazyServiceIdentifier.is. InversifyContainerErrorKind
        es relevante pero queda desconectado del subgrafo de bind (solo tiene el miembro
        invalidOperation) → va en relevant, no en multihop.
