        - "packages/container/libraries/container/src/binding/actions/getBindingId.ts#getBindingId"
        - "packages/container/libraries/container/src/error/models/InversifyContainerError.ts#InversifyContainerError"
        - "packages/container/libraries/container/src/error/models/InversifyContainerErrorKind.ts#InversifyContainerErrorKind"
        - "packages/container/libraries/common/src/services/calculations/stringifyServiceIdentifier.ts#stringifyServiceIdentifier"
        - "packages/container/libraries/common/src/services/models/ServiceIdentifier.ts#ServiceIdentifier"
        - "packages/container/libraries/common/src/services/models/LazyServiceIdentifier.ts#LazyServiceIdentifier"
        - "packages/container/libraries/common/src/services/models/LazyServiceIdentifier.ts#LazyServiceIdentifier.is"
      multihop_nodes:
        - "packages/container/libraries/container/src/binding/models/BindingFluentSyntaxImplementation.ts#BindToFluentSyntaxImplementation.to"
        - "packages/container/libraries/container/src/binding/models/BindingFluentSyntaxImplementation.ts#BindToFluentSyntaxImplementation.toSelf"
        - "packages/container/libraries/container/src/binding/actions/getBindingId.ts#getBindingId"
        - "packages/container/libraries/container/src/error/models/InversifyContainerError.ts#InversifyContainerError"
        - "packages/container/libraries/common/src/services/calculations/stringifyServiceIdentifier.ts#stringifyServiceIdentifier"
        - "packages/container/libraries/common/src/services/models/ServiceIdentifier.ts#ServiceIdentifier"
        - "packages/container/libraries/common/src/services/models/LazyServiceIdentifier.ts#LazyServiceIdentifier"
        - "packages/container/libraries/common/src/services/models/LazyServiceIdentifier.ts#LazyServiceIdentifier.is"
      annotation_notes: >-
        Gold anotado contra el grafo indexado del monorepo inversify/monorepo,
        tag @inversifyjs/container@1.5.2 (commit be5d342a), que fija las versiones
        exactas de InversifyJS v7.0.0: common@1.5.0, container@1.5.2, core@4.0.0.
        El repo inversify/InversifyJS v7.0.0 es solo un cascaron de re-exports, por
        eso se indexa el monorepo (packages/container/libraries/{common,container,core}/src).
        node_id = <ruta_absoluta>#<simbolo>. Anchor primario: Container.bind, que
        construye un BindToFluentSyntaxImplementation (d=1) guardando el serviceIdentifier
