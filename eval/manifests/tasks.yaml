      - "service identifiers"
      - "container resolution"
    target_tests:
      - "pnpm --filter @inversifyjs/container exec jest --config=jest.config.mjs --runInBand src/binding/models/BindingFluentSyntaxImplementation.spec.ts"
    gold:
      status: "ready"
      primary_anchor: "packages/container/libraries/container/src/container/services/Container.ts#Container.bind"
      relevant_nodes:
        - "packages/container/libraries/container/src/container/services/Container.ts#Container.bind"
