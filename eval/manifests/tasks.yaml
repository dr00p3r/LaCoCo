    title: "Trazar metadata de decoradores en inyeccion"
    type: "understanding_plus_patch"
    difficulty: "hard"
    prompt: >-
      Ajusta el manejo de metadata de decoradores para que la resolucion de
      dependencias reporte con claridad cuando falta metadata requerida en un
      constructor decorado.
    deterministic_input:
      retrieval_input:
        query: "inversify report a clear error when required decorator metadata is missing on a constructor injected class"
      oracle_input: null
      embedding_input: "Improve missing decorator metadata error in constructor injection"
      intent: "debug"
      dimensions:
        - "SYS"
        - "CPG"
        - "DTG"
    expected_areas:
      - "metadata reader"
      - "injectable decorators"
      - "constructor injection planning"
    target_tests:
      - "pnpm --filter @inversifyjs/core test src/metadata/calculations/getClassMetadata.spec.ts src/metadata/calculations/throwAtInvalidClassMetadata.spec.ts src/metadata/calculations/validateConstructorMetadataArray.spec.ts"
    gold:
      status: "ready"
      primary_anchor: "packages/container/libraries/core/src/metadata/calculations/getClassMetadata.ts#getClassMetadata"
      relevant_nodes:
        - "packages/container/libraries/core/src/metadata/calculations/getClassMetadata.ts#getClassMetadata"
        - "packages/container/libraries/core/src/metadata/calculations/isPendingClassMetadata.ts#isPendingClassMetadata"
        - "packages/container/libraries/core/src/metadata/calculations/getDefaultClassMetadata.ts#getDefaultClassMetadata"
        - "packages/container/libraries/core/src/metadata/calculations/throwAtInvalidClassMetadata.ts#throwAtInvalidClassMetadata"
        - "packages/container/libraries/core/src/metadata/calculations/validateConstructorMetadataArray.ts#validateConstructorMetadataArray"
        - "packages/container/libraries/core/src/error/models/InversifyCoreError.ts#InversifyCoreError"
        - "packages/container/libraries/core/src/error/models/InversifyCoreErrorKind.ts#InversifyCoreErrorKind"
        - "packages/container/libraries/core/src/metadata/decorators/injectable.ts#injectable"
        - "packages/container/libraries/core/src/metadata/decorators/inject.ts#inject"
        - "packages/container/libraries/core/src/planning/calculations/plan.ts#plan"
        - "packages/container/libraries/core/src/planning/calculations/plan.ts#buildInstancePlanBindingNode"
        - "packages/container/libraries/core/src/resolution/actions/resolveInstanceBindingConstructorParams.ts#resolveInstanceBindingConstructorParams"
      multihop_nodes:
        - "packages/container/libraries/core/src/error/models/InversifyCoreError.ts#InversifyCoreError"
        - "packages/container/libraries/core/src/metadata/decorators/injectable.ts#injectable"
        - "packages/container/libraries/core/src/metadata/decorators/inject.ts#inject"
        - "packages/container/libraries/core/src/planning/calculations/plan.ts#plan"
        - "packages/container/libraries/core/src/planning/calculations/plan.ts#buildInstancePlanBindingNode"
        - "packages/container/libraries/core/src/resolution/actions/resolveInstanceBindingConstructorParams.ts#resolveInstanceBindingConstructorParams"
      annotation_notes: >-
        Gold anotado contra el grafo indexado del monorepo inversify/monorepo,
        tag @inversifyjs/container@1.5.2 (commit be5d342a), que fija las versiones
        exactas de InversifyJS v7.0.0 (common@1.5.0, container@1.5.2, core@4.0.0).
        node_id = <ruta_absoluta>#<simbolo>. Anchor primario: getClassMetadata, el
        lector de metadata que usa el planner. Lee la metadata de reflect
        (classMetadataReflectKey) o cae en getDefaultClassMetadata (d=1); si la clase
        tiene metadata pendiente (isPendingClassMetadata, d=1) delega en
        throwAtInvalidClassMetadata (d=1) que reporta "Missing or incomplete metadata ...
        Every constructor parameter must be decorated with @inject/@multiInject/@unmanaged";
        en caso contrario validateConstructorMetadataArray (d=1) exige un elemento por
        argumento del constructor. Ambos lanzan InversifyCoreError (d=2) con
        InversifyCoreErrorKind.missingInjectionDecorator. La metadata la escribe el decorador
        injectable (d=3) e inject (d=5). El planner plan/buildInstancePlanBindingNode (d=3)
        invoca getClassMetadata al planear la inyeccion por constructor, y
        resolveInstanceBindingConstructorParams (d=3) resuelve esos parametros. multihop_nodes
        verificados a distancia BFS >=2: InversifyCoreError (d=2), injectable (d=3), plan (d=3),
        buildInstancePlanBindingNode (d=3), resolveInstanceBindingConstructorParams (d=3),
        inject (d=5). InversifyCoreErrorKind y classMetadataReflectKey son relevantes pero
        dispersos/desconectados del anchor → InversifyCoreErrorKind va en relevant (no multihop)
        y el reflect key (VARIABLE, grado 0) se omite del gold de simbolos editables.
    regression:
      base_commit: "be5d342a5a593954895c2fda712648d219c1b72d"
      broken_patch: "regression/inversify-002.broken.diff"
      grading_tests:
        - "throwAtInvalidClassMetadata › having valid class metadata › when called › should throw an Error"
        - "throwAtInvalidClassMetadata › having invalid class metadata with both undefined and invalid constructor metadata and invalid property metadata › when called › should throw an Error"
    tags:
      - "decorators"
      - "multi-hop"

